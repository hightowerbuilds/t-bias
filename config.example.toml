# t-bias terminal configuration
# Copy this file to ~/.config/tbias/config.toml and customize as desired.
# All settings are optional — omitted values use the defaults shown below.

# Shell to use. Empty string (default) uses your system default shell.
# shell = "/bin/zsh"
shell = ""

# Scrollback buffer size (number of lines kept above the visible area).
scrollback_limit = 5000

# Padding around the terminal content in CSS pixels.
padding = 0

[font]
family = "Menlo, Monaco, 'Courier New', monospace"
size = 14

[cursor]
# Cursor shape: "block", "underline", or "bar"
style = "block"
# Whether the cursor blinks
blink = true

[shells]
# When to restore persisted shells on launch: "always", "never", or "ask"
restore = "ask"
# Whether new shells should stay in the shell registry as restorable entries after quitting the app
persist_on_quit = false

[theme]
# Optional preset: "dracula", "solarized-dark", "one-dark", "catppuccin-mocha"
# When set, overrides individual colors below that are still at defaults.
# preset = "catppuccin-mocha"
background = "#1e1e1e"
foreground = "#d4d4d4"
cursor = "#d4d4d4"
selection_bg = "#264f78"

# ANSI color palette (16 colors: 8 normal + 8 bright)
ansi = [
  "#1e1e1e",  # 0  black
  "#f44747",  # 1  red
  "#6a9955",  # 2  green
  "#d7ba7d",  # 3  yellow
  "#569cd6",  # 4  blue
  "#c586c0",  # 5  magenta
  "#4ec9b0",  # 6  cyan
  "#d4d4d4",  # 7  white
  "#808080",  # 8  bright black
  "#f44747",  # 9  bright red
  "#6a9955",  # 10 bright green
  "#d7ba7d",  # 11 bright yellow
  "#569cd6",  # 12 bright blue
  "#c586c0",  # 13 bright magenta
  "#4ec9b0",  # 14 bright cyan
  "#ffffff",  # 15 bright white
]
